<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Airbnb Wishlist/Listing Analyzer</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 260px;
        min-height: 60px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #2c2c2c;
        text-align: center;
      }

      p {
        margin: 0;
        font-size: 14px;
        line-height: 1.4;
      }

      #versionNotice {
        display: none;
        width: calc(100% - 20px);
        padding: 8px 10px;
        border-radius: 4px;
        background-color: #FFF8E1;
        color: #8A5A00;
        font-size: 12px;
        line-height: 1.4;
      }

      #versionNotice a {
        color: #1976D2;
        text-decoration: none;
        font-weight: 600;
      }

      #versionNotice a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="versionNotice"></div>
    <p>You need to be on an Airbnb wishlist or listing page.</p>
    <script src="version-check.js"></script>
    <script src="inactive.js"></script>
  </body>
</html>
