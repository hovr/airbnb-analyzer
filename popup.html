<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    h2 {
      margin-top: 0;
      color: #FF5A5F;
    }
    button {
      background-color: #FF5A5F;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin-bottom: 10px;
    }
    button:hover {
      background-color: #E04A4F;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
    }
    .info {
      background-color: #E3F2FD;
      color: #1976D2;
    }
    .success {
      background-color: #E8F5E9;
      color: #388E3C;
    }
    .error {
      background-color: #FFEBEE;
      color: #C62828;
    }
    .progress {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
    #propertyCount {
      margin: 10px 0;
      font-size: 14px;
      color: #484848;
    }
    #resetLink {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
    }
    #resetLink a {
      color: #1976D2;
      text-decoration: none;
    }
    #resetLink a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>Airbnb Wishlist Analyzer</h2>
  <div id="propertyCount"></div>
  <button id="startBtn">Start Analysis</button>
  <button id="copyBtn" style="display:none;">Copy Prompt</button>
  <div id="status"></div>
  <div id="resetLink" style="margin-top:12px; font-size:12px; text-align:center;">
    <a href="#" id="resetState">Reset analyzer state</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
